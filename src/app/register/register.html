<h2>Student Registration</h2>

<form (ngSubmit)="register()">
  <input type="text" placeholder="Name" [(ngModel)]="student.name" name="name" required><br><br>

  <input type="email" placeholder="Email" [(ngModel)]="student.email" name="email" required><br><br>

  <input type="text" placeholder="Course" [(ngModel)]="student.course" name="course" required><br><br>

  <button type="submit">Register</button>
</form>
